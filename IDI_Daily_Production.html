<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IDI Daily Production</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IDI Production">
<meta name="theme-color" content="#0d1e32">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:        #14304e;
  --navy-dark:   #0d1e32;
  --navy-light:  #1a3a5c;
  --accent:      #5a8fb5;
  --accent-light:#7aafd5;
  --steel-pale:  #e8f0f8;
  --red:         #c8281e;
  --red-pale:    #fdecea;
  --green:       #1a7a40;
  --green-pale:  #e8f5ee;
  --yellow:      #d4a017;
  --yellow-pale: #fdf6e3;
  --gray-50:     #f8f9fa;
  --gray-100:    #f0f2f5;
  --gray-200:    #e0e4ea;
  --gray-400:    #9aa5b4;
  --gray-600:    #4a5568;
  --gray-800:    #1a2332;
  --font-head:   'Barlow Condensed', sans-serif;
  --font-body:   'Barlow', sans-serif;
  --radius:      12px;
  --shadow:      0 2px 12px rgba(20,48,78,0.10);
  --shadow-lg:   0 8px 32px rgba(20,48,78,0.18);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;height:100%}
body{background:var(--gray-100);font-family:var(--font-body);color:var(--gray-800);min-height:100vh;min-height:-webkit-fill-available}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
button{-webkit-tap-highlight-color:transparent}

/* ── AUTH SCREEN ── */
.auth-screen{min-height:100vh;background:linear-gradient(160deg,var(--navy-dark) 0%,var(--navy) 60%,var(--navy-light) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.auth-logo{margin-bottom:32px;text-align:center}
.auth-diamond{width:72px;height:72px;background:var(--accent);clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.auth-diamond-text{font-family:var(--font-head);font-size:22px;font-weight:800;color:var(--navy-dark);letter-spacing:2px}
.auth-company{font-family:var(--font-head);font-size:24px;font-weight:800;color:#fff;letter-spacing:3px;text-transform:uppercase}
.auth-sub{font-size:12px;color:rgba(90,143,181,0.6);letter-spacing:2px;margin-top:4px;text-transform:uppercase}
.auth-card{background:rgba(255,255,255,0.06);border:1.5px solid rgba(90,143,181,0.2);border-radius:16px;padding:24px;width:100%;max-width:360px;backdrop-filter:blur(10px)}
.auth-tabs{display:flex;gap:2px;background:rgba(0,0,0,0.2);border-radius:8px;padding:3px;margin-bottom:20px}
.auth-tab{flex:1;padding:8px;border:none;border-radius:6px;cursor:pointer;font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:1px;background:transparent;color:rgba(255,255,255,0.4);transition:all 0.15s;text-transform:uppercase}
.auth-tab.active{background:var(--accent);color:var(--navy-dark)}
.auth-field{margin-bottom:14px}
.auth-field label{display:block;font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px}
.auth-field input,.auth-field select{width:100%;background:rgba(255,255,255,0.08);border:1.5px solid rgba(90,143,181,0.25);border-radius:8px;color:#fff;font-family:var(--font-body);font-size:16px;padding:12px 14px;outline:none;transition:border-color 0.15s}
.auth-field input:focus,.auth-field select:focus{border-color:var(--accent)}
.auth-field select option{background:var(--navy-dark);color:#fff}
.auth-hint{font-size:11px;color:rgba(90,143,181,0.6);margin-top:6px;line-height:1.4}
.auth-err{background:rgba(200,40,30,0.15);border:1px solid rgba(200,40,30,0.3);border-radius:8px;padding:10px 12px;font-size:12px;color:#ff8080;margin-bottom:14px;display:none}
.auth-err.show{display:block}

/* ── HEADER ── */
.app-header{background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy) 60%,var(--navy-light) 100%);border-bottom:3px solid var(--accent);position:sticky;top:0;z-index:100}
.header-main{display:flex;align-items:center;min-height:56px;padding:0 12px;gap:10px}
.header-brand{display:flex;align-items:center;gap:8px;flex-shrink:0}
.brand-diamond{width:36px;height:36px;background:var(--accent);clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-idi{font-family:var(--font-head);font-size:11px;font-weight:800;color:var(--navy-dark);letter-spacing:1px}
.header-center{flex:1;text-align:center}
.header-title{font-family:var(--font-head);font-size:18px;font-weight:800;color:#fff;letter-spacing:3px;text-transform:uppercase;text-shadow:0 0 20px rgba(90,143,181,0.3)}
.header-user{font-size:10px;color:rgba(90,143,181,0.6);letter-spacing:1px;margin-top:1px}
.header-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.icon-btn{background:rgba(255,255,255,0.08);border:1.5px solid rgba(90,143,181,0.2);border-radius:8px;color:#fff;font-size:16px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent}
.icon-btn:active{background:rgba(255,255,255,0.16)}

/* ── BOTTOM NAV (mobile) ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--navy-dark);border-top:2px solid rgba(90,143,181,0.2);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;border:none;background:transparent;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all 0.15s;gap:3px}
.bnav-btn .bnav-icon{font-size:20px;line-height:1}
.bnav-btn .bnav-label{font-family:var(--font-head);font-size:9px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,0.3);text-transform:uppercase;transition:color 0.15s}
.bnav-btn.active .bnav-label{color:var(--accent)}
.bnav-btn.active .bnav-icon{filter:drop-shadow(0 0 4px rgba(90,143,181,0.6))}

/* ── PAGE LAYOUT ── */
.page-wrap{padding:14px 12px 90px;max-width:1400px;margin:0 auto}

/* ── CARDS ── */
.card{background:#fff;border:1.5px solid var(--gray-200);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.card-header{padding:12px 14px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;gap:10px;background:#fff}
.card-title{font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--navy);letter-spacing:1.5px;text-transform:uppercase;flex:1}
.card-body{padding:14px}

/* ── BUTTONS ── */
.btn{border:none;border-radius:10px;cursor:pointer;font-family:var(--font-head);font-weight:700;letter-spacing:0.5px;transition:all 0.15s;display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;font-size:14px;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--navy);color:#fff}
.btn-accent{background:var(--accent);color:var(--navy-dark)}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-yellow{background:var(--yellow);color:#fff}
.btn-ghost{background:var(--gray-100);color:var(--gray-600);border:1.5px solid var(--gray-200)}
.btn-dark{background:rgba(255,255,255,0.08);color:#fff;border:1.5px solid rgba(90,143,181,0.2)}
.btn-lg{padding:16px 28px;font-size:17px;border-radius:12px}
.btn-sm{padding:7px 13px;font-size:12px;border-radius:8px}
.btn-block{width:100%}
.btn:disabled{opacity:0.4;cursor:not-allowed}

/* ── MY MACHINE SCREEN ── */
.machine-hero{background:linear-gradient(135deg,var(--navy-dark),var(--navy));border-radius:var(--radius);padding:20px;margin-bottom:12px;border:1.5px solid rgba(90,143,181,0.3)}
.machine-hero-label{font-size:10px;color:rgba(90,143,181,0.6);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.machine-hero-name{font-family:var(--font-head);font-size:28px;font-weight:800;color:#fff;letter-spacing:2px;line-height:1}
.machine-hero-dept{font-size:13px;color:rgba(90,143,181,0.7);margin-top:4px}
.machine-stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:16px}
.machine-stat{background:rgba(255,255,255,0.07);border-radius:10px;padding:12px 8px;text-align:center}
.machine-stat-val{font-family:var(--font-head);font-size:26px;font-weight:800;color:#fff;line-height:1}
.machine-stat-val.good{color:#4dcc80}
.machine-stat-val.warn{color:#f0c040}
.machine-stat-val.bad{color:#ff8080}
.machine-stat-val.none{color:rgba(255,255,255,0.3)}
.machine-stat-lbl{font-size:9px;color:rgba(90,143,181,0.5);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px}

/* Active downtime banner */
.active-dt-banner{background:linear-gradient(135deg,#7a1a10,var(--red));border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;border:1.5px solid rgba(255,100,80,0.4)}
.active-dt-pulse{width:12px;height:12px;border-radius:50%;background:#ff8080;flex-shrink:0;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.3)}}
.active-dt-info{flex:1}
.active-dt-type{font-family:var(--font-head);font-size:15px;font-weight:800;color:#fff;letter-spacing:1px}
.active-dt-time{font-size:12px;color:rgba(255,200,200,0.8);margin-top:2px}
.active-dt-timer{font-family:var(--font-head);font-size:24px;font-weight:800;color:#fff;flex-shrink:0}

/* Downtime log list */
.dt-log-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-100)}
.dt-log-item:last-child{border-bottom:none}
.dt-log-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dt-log-dot.changeover{background:var(--accent)}
.dt-log-dot.material{background:var(--yellow)}
.dt-log-dot.mechanical{background:var(--red)}
.dt-log-dot.forklift{background:#e07820}
.dt-log-dot.other{background:var(--gray-400)}
.dt-log-info{flex:1}
.dt-log-type{font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--navy);letter-spacing:0.5px}
.dt-log-notes{font-size:11px;color:var(--gray-400);margin-top:1px}
.dt-log-time{font-size:10px;color:var(--gray-400);margin-top:2px}
.dt-log-dur{font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--navy);flex-shrink:0}
.dt-log-dur.active{color:var(--red)}

/* ── DASHBOARD ── */
.summary-bar{background:linear-gradient(135deg,var(--navy-dark),var(--navy));border-radius:var(--radius);padding:14px;margin-bottom:12px;border:1.5px solid rgba(90,143,181,0.25)}
.summary-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.summary-stat{text-align:center}
.summary-stat-val{font-family:var(--font-head);font-size:26px;font-weight:800;color:#fff;line-height:1}
.summary-stat-val.good{color:#4dcc80}
.summary-stat-val.warn{color:#f0c040}
.summary-stat-val.bad{color:#ff8080}
.summary-stat-lbl{font-size:8px;color:rgba(90,143,181,0.5);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px}
.refresh-row{display:flex;align-items:center;justify-content:space-between}
.refresh-txt{font-size:10px;color:rgba(90,143,181,0.5);letter-spacing:1px}

.dept-card{background:#fff;border:1.5px solid var(--gray-200);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.dept-card-head{background:linear-gradient(135deg,var(--navy-dark),var(--navy));padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.dept-card-name{font-family:var(--font-head);font-size:15px;font-weight:800;color:#fff;letter-spacing:1px;text-transform:uppercase}
.dept-card-sub{font-size:10px;color:rgba(90,143,181,0.6);margin-top:2px}
.dept-oe{font-family:var(--font-head);font-size:20px;font-weight:800;padding:5px 10px;border-radius:8px;line-height:1}
.dept-oe.good{background:rgba(26,122,64,0.25);color:#4dcc80}
.dept-oe.warn{background:rgba(212,160,23,0.25);color:#f0c040}
.dept-oe.bad{background:rgba(200,40,30,0.25);color:#ff8080}
.dept-oe.none{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.25)}
.dept-card-body{padding:10px 14px}
.mach-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--gray-100)}
.mach-row:last-child{border-bottom:none}
.mach-name{font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--navy)}
.mach-detail{font-size:10px;color:var(--gray-400);margin-top:1px}
.mach-val{font-family:var(--font-head);font-size:13px;font-weight:700}
.mach-val.good{color:var(--green)}
.mach-val.warn{color:var(--yellow)}
.mach-val.bad{color:var(--red)}
.mach-val.none{color:var(--gray-400)}
.dept-card-foot{background:var(--gray-50);border-top:1px solid var(--gray-200);padding:8px 14px;display:flex;justify-content:space-between}
.foot-stat-lbl{font-size:9px;color:var(--gray-400);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.foot-stat-val{font-family:var(--font-head);font-size:14px;font-weight:800;color:var(--navy)}

/* Live feed */
.feed-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-100)}
.feed-item:last-child{border-bottom:none}
.feed-badge{background:var(--navy);color:var(--accent);font-family:var(--font-head);font-size:10px;font-weight:800;padding:3px 7px;border-radius:6px;white-space:nowrap;flex-shrink:0;letter-spacing:0.5px;line-height:1.4;text-align:center}
.feed-info{flex:1}
.feed-main{font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--navy)}
.feed-sub{font-size:11px;color:var(--gray-400);margin-top:1px}
.feed-time{font-size:10px;color:var(--gray-400);margin-top:2px}
.feed-pill{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;font-family:var(--font-head);letter-spacing:0.5px;margin-left:4px}
.fp-red{background:var(--red-pale);color:var(--red)}
.fp-yellow{background:var(--yellow-pale);color:var(--yellow)}
.fp-green{background:var(--green-pale);color:var(--green)}
.fp-blue{background:var(--steel-pale);color:var(--accent)}

/* ── ENTRY FORM (end of shift) ── */
.form-screen{position:fixed;inset:0;background:var(--navy-dark);z-index:300;display:none;flex-direction:column}
.form-screen.open{display:flex}
.form-header{background:var(--navy);border-bottom:2px solid var(--accent);padding:12px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;padding-top:max(12px,env(safe-area-inset-top))}
.form-title{font-family:var(--font-head);font-size:18px;font-weight:800;color:#fff;letter-spacing:2px;flex:1}
.form-body{flex:1;overflow-y:auto;padding:16px 14px;-webkit-overflow-scrolling:touch}
.form-footer{background:var(--navy);border-top:1px solid rgba(90,143,181,0.2);padding:12px 14px;display:flex;gap:10px;flex-shrink:0;padding-bottom:max(12px,env(safe-area-inset-bottom))}

.dark-field{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.dark-field label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1.5px}
.dark-field input,.dark-field select,.dark-field textarea{background:rgba(255,255,255,0.08);border:1.5px solid rgba(90,143,181,0.25);border-radius:10px;color:#fff;font-family:var(--font-body);font-size:16px;padding:12px 14px;outline:none;transition:border-color 0.15s;width:100%;-webkit-appearance:none}
.dark-field input:focus,.dark-field select:focus,.dark-field textarea:focus{border-color:var(--accent)}
.dark-field select option{background:var(--navy-dark);color:#fff}
.hint{font-size:12px;font-weight:600;margin-top:4px}
.hint.neutral{color:rgba(90,143,181,0.7)}
.hint.good{color:#4dcc80}
.hint.warn{color:#f0c040}
.hint.bad{color:#ff8080}
.dark-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.dark-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 12px}
.sec-label{font-family:var(--font-head);font-size:11px;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase;padding:6px 0 10px;border-bottom:1px solid rgba(90,143,181,0.15);margin-bottom:14px;margin-top:4px}

/* Downtime event type picker */
.dt-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.dt-type-btn{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);border-radius:10px;padding:14px 10px;cursor:pointer;text-align:center;transition:all 0.15s;-webkit-tap-highlight-color:transparent}
.dt-type-btn:active{transform:scale(0.97)}
.dt-type-btn.sel{border-color:var(--accent);background:rgba(90,143,181,0.15)}
.dt-type-icon{font-size:22px;display:block;margin-bottom:4px}
.dt-type-label{font-family:var(--font-head);font-size:12px;font-weight:700;color:rgba(255,255,255,0.7);letter-spacing:0.5px}
.dt-type-btn.sel .dt-type-label{color:#fff}

/* ── ADMIN / HISTORY ── */
.section-title{font-family:var(--font-head);font-size:12px;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin:16px 0 8px}
.user-item{background:#fff;border:1.5px solid var(--gray-200);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.user-avatar{width:38px;height:38px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:14px;font-weight:800;color:var(--accent);flex-shrink:0}
.user-info{flex:1}
.user-name{font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--navy)}
.user-detail{font-size:11px;color:var(--gray-400);margin-top:1px}
.user-role-badge{font-family:var(--font-head);font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:0.5px}
.role-manager{background:var(--steel-pale);color:var(--accent)}
.role-operator{background:var(--green-pale);color:var(--green)}

.entry-item{background:#fff;border:1.5px solid var(--gray-200);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.entry-badge{background:var(--navy);color:var(--accent);font-family:var(--font-head);font-size:10px;font-weight:800;padding:4px 7px;border-radius:6px;white-space:nowrap;flex-shrink:0;text-align:center;line-height:1.5}
.entry-info{flex:1;min-width:0}
.entry-main{font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--navy)}
.entry-sub{font-size:11px;color:var(--gray-400);margin-top:2px}
.entry-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;font-family:var(--font-head);letter-spacing:0.5px}
.pill-good{background:var(--green-pale);color:var(--green)}
.pill-warn{background:var(--yellow-pale);color:var(--yellow)}
.pill-bad{background:var(--red-pale);color:var(--red)}
.pill-blue{background:var(--steel-pale);color:var(--accent)}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:10px 20px;border-radius:20px;font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:1px;z-index:9999;border:1.5px solid var(--accent);transition:all 0.25s;opacity:0;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Utilities */
.hidden{display:none!important}
.text-center{text-align:center}
.mt8{margin-top:8px}
.mt12{margin-top:12px}

const LS = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } },
  set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),

};

// LocalStorage only for active downtime timer (persists across refreshes)



// ═══════════════════════════════════════════════════
// MACHINE CONFIG (Firestore override of DEPT_CONFIG)
// ═══════════════════════════════════════════════════
let _machineConfig = {};  // Overrides loaded from Firestore

async function loadMachineConfig() {
  try {
    const snap = await db.collection('config').doc('machines').get();
    if (snap.exists) _machineConfig = snap.data();
  } catch(e) { console.log('Machine config load error:', e); }
}

async function saveMachineConfig() {
  await db.collection('config').doc('machines').set(_machineConfig);
  // Rebuild signup machine dropdown if visible
  const deptSel = document.getElementById('signup-dept');
  if (deptSel?.value) populateMachineSelect(deptSel.value);
  // Force dashboard tile re-render so new machine names show immediately
  if (_currentScreen === 'dashboard') {
    const today = TODAY();
    loadRecordsForDate(today).then(recs => {
      const tilesEl = document.getElementById('dash-tiles');
      if (tilesEl) tilesEl.innerHTML = buildDeptTiles(recs);
    });
  }
}

// Get machines for a dept — Firestore overrides take precedence
function getDeptMachines(deptId) {
  if (_machineConfig[deptId]) return _machineConfig[deptId];
  const dept = DEPT_CONFIG[deptId];
  if (!dept) return [];
  return Array.isArray(dept.machines) && typeof dept.machines[0]==='object'
    ? dept.machines : dept.machines.map(m => ({name:m, type:null}));
}

// ═══════════════════════════════════════════════════
// STANDARDS (Firestore + local cache)
// ═══════════════════════════════════════════════════
function getStd(deptId) {
  return { ...DEFAULT_STANDARDS[deptId], ...(_standards[deptId] || {}) };
}
function getMachineStdOutput(deptId, machineName) {
  const dept = DEPT_CONFIG[deptId];
  if (!dept) return null;
  if (deptId === 'door_assembly') {
    const machines = getDeptMachines(deptId);
    const machObj = machines.find(m => (m.name||m) === machineName);
    if (!machObj) return null;
    const std = getStd('door_assembly');
    return std[machObj.type] || machObj.std || getStd('door_assembly')[machObj.type] || null;
  }
  return getStd(deptId).output || null;
}
function getMachineStd(deptId, machine) { return getMachineStdOutput(deptId, machine); }

async function loadStandards() {
  try {
    const snap = await db.collection('config').doc('standards').get();
    if (snap.exists) _standards = snap.data();
  } catch(e) { console.log('Standards load error:', e); }
}

async function saveStandardToFirestore(deptId, key, value) {
  if (!_standards[deptId]) _standards[deptId] = {};
  _standards[deptId][key] = value;
  await db.collection( 'config').doc('standards').set(_standards, {merge: true});
}

  document.getElementById('auth-signup').classList.toggle('hidden', tab!=='signup');
  clearAuthErr();
}
function showAuthErr(msg) { const el=document.getElementById('auth-err'); el.textContent=msg; el.classList.add('show'); }
function clearAuthErr()   { document.getElementById('auth-err').classList.remove('show'); }
function showAuthLoading(on) {
  const btns = document.querySelectorAll('#auth-login .btn, #auth-signup .btn');
  btns.forEach(b => b.disabled = on);
}

    if (role === 'operator') { populateDeptSelect(); dWrap.style.display='block'; }
    else { dWrap.style.display='none'; mWrap.style.display='none'; }
  });
  document.getElementById('signup-dept').addEventListener('change', function() {
    populateMachineSelect(this.value);
    document.getElementById('signup-machine-wrap').style.display='block';
  });

  // Firebase auth state listener
  auth.onAuthStateChanged( async fbUser => {
    if (fbUser) {
      _user = fbUser;
      await loadUserProfile(fbUser.uid);
      await loadStandards();
  await loadMachineConfig();
      showMainApp();
    } else {
      _user = null;
      _profile = null;
      showAuthScreen();
    }
  });
});

async function loadUserProfile(uid) {
  // Unsubscribe any existing profile listener
  if (_profileUnsub) { _profileUnsub(); _profileUnsub = null; }
  
  // Use real-time listener so machine renames update instantly on operator phones
  return new Promise((resolve) => {
    _profileUnsub = db.collection('users').doc(uid).onSnapshot(snap => {
      if (snap.exists) {
        _profile = snap.data();
        // Update header if app is already running
        const headerEl = document.getElementById('header-user-info');
        if (headerEl && _profile) {
          const role = _profile.role || 'operator';
          const machine = _profile.machine || '';
          headerEl.textContent = _profile.name + ' · ' + (role === 'manager' ? 'Manager' : machine || 'Operator');
        }
        // Re-render machine screen if operator is on it
        if (_currentScreen === 'machine') renderMachineScreen();
      }
      resolve();
    }, err => {
      console.log('Profile listener error:', err);
      resolve();
    });
  });
}

// Refresh profile from Firestore
async function refreshProfile() {
  if (!_user) return;
  const snap = await db.collection('users').doc(_user.uid).get();
  if (snap.exists) {
    _profile = snap.data();
    const headerEl = document.getElementById('header-user-info');
    if (headerEl && _profile) {
      const role = _profile.role || 'operator';
      const machine = _profile.machine || '';
      headerEl.textContent = _profile.name + ' · ' + (role === 'manager' ? 'Manager' : machine || 'Operator');
    }
  }
}

async function doLogin() {
  clearAuthErr();
  const email = document.getElementById('login-email').value.trim();
  const pw    = document.getElementById('login-pw').value;
  if (!email || !pw) { showAuthErr('Please enter email and password.'); return; }
  showAuthLoading(true);
  try {
    await auth.signInWithEmailAndPassword( email, pw);
    // onAuthStateChanged handles the rest
  } catch(e) {
    showAuthLoading(false);
    showAuthErr(e.code === 'auth/invalid-credential' ? 'Email or password is incorrect.' : e.message);
  }
}

async function doSignup() {
  clearAuthErr();
  const name  = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pw    = document.getElementById('signup-pw').value;
  const code  = document.getElementById('signup-code').value.trim();
  const role  = ACCESS_CODES[code];

  if (!name)         { showAuthErr('Please enter your name.'); return; }
  if (!email)        { showAuthErr('Please enter your email.'); return; }
  if (pw.length < 6) { showAuthErr('Password must be at least 6 characters.'); return; }
  if (!role)         { showAuthErr('Access code is invalid. Check with Shane or Jeremy.'); return; }

  let deptId = null, machine = null;
  if (role === 'operator') {
    deptId  = document.getElementById('signup-dept').value;
    machine = document.getElementById('signup-machine').value;
    if (!deptId)  { showAuthErr('Please select your department.'); return; }
    if (!machine) { showAuthErr('Please select your machine.'); return; }
  }

  showAuthLoading(true);
  try {
    const cred = await auth.createUserWithEmailAndPassword( email, pw);
    // Save profile to Firestore
    await db.collection( 'users').doc(cred.user.uid).set({
      name, email, role, deptId, machine, createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    // onAuthStateChanged handles boot
  } catch(e) {
    showAuthLoading(false);
    showAuthErr(e.code === 'auth/email-already-in-use' ? 'An account with that email already exists.' : e.message);
  }
}

async function doLogout() {
  clearInterval(_timerInterval);
  if (_unsubRecords)  { _unsubRecords();  _unsubRecords  = null; }
  if (_unsubDowntime) { _unsubDowntime(); _unsubDowntime = null; }
  if (_dashUnsub)     { _dashUnsub();     _dashUnsub     = null; }
  if (_profileUnsub)  { _profileUnsub();  _profileUnsub  = null; }
  await auth.signOut();
}

function bootApp() {
  const name    = _profile?.name    || _user?.email || 'User';
  const role    = _profile?.role    || 'operator';
  const machine = _profile?.machine || '';
  document.getElementById('header-user-info').textContent =
    `${name} · ${role === 'manager' ? 'Manager' : machine || 'Operator'}`;

  buildBottomNav();
  _activeDt = LS.get('idi_active_dt');

  if (role === 'operator') {
    showScreen('machine');
  } else {
    // Show dashboard shell immediately, then load data after DOM settles
    showScreen('dashboard');
    setTimeout(() => renderDashboard(), 100);
  }

  // Real-time Firestore listeners
  setupRealtimeListeners();
  startLiveTimer();
}

function buildBottomNav() {
  const isManager = _profile?.role === 'manager';
  const tabs = [
    ...(isManager ? [] : [{id:'machine', icon:'🖥️', label:'My Machine'}]),
    {id:'dashboard', icon:'📊', label:'Dashboard'},
    ...(isManager ? [{id:'history', icon:'📅', label:'History'},{id:'admin', icon:'⚙️', label:'Admin'}] : []),
    {id:'help', icon:'❓', label:'Help'},
  ];
  document.getElementById('bottom-nav').innerHTML = tabs.map(t =>
    `<button class="bnav-btn" id="bnav-${t.id}" onclick="window._showScreen('${t.id}')">
      <span class="bnav-icon">${t.icon}</span>
      <span class="bnav-label">${t.label}</span>
    </button>`).join('');
}

function showScreen(name) {
  _currentScreen = name;
  ['machine','dashboard','history','admin','help'].forEach(s => {
    const el  = document.getElementById('screen-'+s);
    const btn = document.getElementById('bnav-'+s);
    if (el)  el.classList.toggle('hidden', s!==name);
    if (btn) btn.classList.toggle('active', s===name);
  });
  if (name==='machine')   renderMachineScreen();
  if (name==='dashboard') renderDashboard();
  if (name==='history')   renderHistory();
  if (name==='admin')     renderAdmin();
  if (name==='help')      renderHelp();
}
window._showScreen = showScreen;

// REAL-TIME LISTENERS (Firestore onSnapshot)
// ═══════════════════════════════════════════════════
let _unsubRecords = null;
let _unsubDowntime = null;

function setupRealtimeListeners() {
  const today = TODAY();
  
  // Refresh profile to pick up any machine renames
  if (_user) refreshProfile();
  
  // Unsubscribe any existing listeners
  if (_unsubRecords)  { _unsubRecords();  _unsubRecords  = null; }
  if (_unsubDowntime) { _unsubDowntime(); _unsubDowntime = null; }

  // Listen to records collection for today
  _unsubRecords = db.collection('records')
    .where('date', '==', today)
    .onSnapshot(snap => {
      const recs = snap.docs.map(d => d.data());
      if (_currentScreen === 'dashboard') {
        updateDashboardData(recs);
      }
    }, err => console.log('Records listener error:', err));

  // Listen to downtime collection for today
  _unsubDowntime = db.collection('downtime')
    .where('date', '==', today)
    .onSnapshot(snap => {
      const allDt = [];
      snap.docs.forEach(d => {
        const data = d.data();
        (data.events || []).forEach(e => allDt.push({...e, machine: data.machine}));
      });
      allDt.sort((a,b) => b.startTs - a.startTs);
      if (_activeDt) allDt.unshift({..._activeDt, endTs: null});
      if (_currentScreen === 'dashboard') {
        updateLiveFeed(allDt);
      }
    }, err => console.log('Downtime listener error:', err));
}

function updateDashboardData(recs) {
  const summaryWrap = document.getElementById('dash-summary-wrap');
  if (summaryWrap) summaryWrap.innerHTML = buildSummaryBar(recs);
  const tilesEl = document.getElementById('dash-tiles');
  if (tilesEl) tilesEl.innerHTML = buildDeptTiles(recs);
}

function updateLiveFeed(allDt) {
  const feedWrap = document.getElementById('dash-feed-wrap');
  if (feedWrap) feedWrap.innerHTML = buildLiveFeed(allDt);
}

// MACHINE SCREEN
// ═══════════════════════════════════════════════════
async function renderMachineScreen() {
  const machine = _profile?.machine;
  const deptId  = _profile?.deptId;
  if (!machine) { document.getElementById('machine-page').innerHTML='<div style="text-align:center;padding:40px;color:var(--gray-400)">No machine assigned. Contact your manager.</div>'; return; }
  const dept  = DEPT_CONFIG[deptId];
  const today = TODAY();

  // Load today's data from Firestore
  const dtLog = await loadDtLog(today, machine);
  const eos   = await loadEOS(today, machine);
  const std   = getMachineStd(deptId, machine);

  const totalDtMs  = dtLog.reduce((a,e)=>a+(e.endTs?e.endTs-e.startTs:0),0);
  const totalDtMin = Math.round(totalDtMs/60000);
  const changeovers= dtLog.filter(e=>e.isChangeover).length;
  const output     = eos?.output || null;
  const stdPerMin  = std ? std / 480 : null;
  const actualMins = eos ? (parseFloat(eos.hrs)||8)*60 : 480;
  const machObjForFte2 = getDeptMachines(_profile?.deptId||'').find(m=>(m.name||m)===machine);
  const stdFteForOE2 = machObjForFte2?.fte || getStd(_profile?.deptId||'')?.fte || 1;
  const fteRatio2 = eos && stdFteForOE2 > 0 ? (parseFloat(eos.fte)||stdFteForOE2) / stdFteForOE2 : 1;
  const adjStd     = stdPerMin ? stdPerMin * actualMins * fteRatio2 : null;
  const oe         = (output&&adjStd) ? output/adjStd : null;
  const oeClass    = oe===null?'none':oe>=0.85?'good':oe>=0.70?'warn':'bad';

  let html = `
    <div class="machine-hero">
      <div class="machine-hero-label">Your Machine — ${today}</div>
      <div class="machine-hero-name">${machine}</div>
      <div class="machine-hero-dept">${dept?dept.icon+' '+dept.name:''}</div>
      <div class="machine-stats-row">
        <div class="machine-stat"><div class="machine-stat-val ${oeClass}">${oe!==null?Math.round(oe*100)+'%':'—'}</div><div class="machine-stat-lbl">OE</div></div>
        <div class="machine-stat"><div class="machine-stat-val ${totalDtMin>60?'bad':totalDtMin>30?'warn':totalDtMin>0?'good':'none'}">${totalDtMin}</div><div class="machine-stat-lbl">DT Mins</div></div>
        <div class="machine-stat"><div class="machine-stat-val ${changeovers>0?'warn':'none'}">${changeovers}</div><div class="machine-stat-lbl">Changeovers</div></div>
      </div>
    </div>`;

  if (_activeDt && _activeDt.machine===machine) {
    html += `
      <div class="active-dt-banner">
        <div class="active-dt-pulse"></div>
        <div class="active-dt-info">
          <div class="active-dt-type">⏱ DOWNTIME — ACTIVE</div>
          <div class="active-dt-time">Started ${fmtTime(_activeDt.startTs)}</div>
        </div>
        <div class="active-dt-timer" id="live-timer">—</div>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:12px">
        <button class="btn btn-yellow btn-lg" style="flex:2" onclick="window._stopDowntime()">⏹ Stop Timer</button>
        <button class="btn btn-ghost btn-lg" style="flex:1;border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.5)" onclick="window._undoDowntime()">✕ Undo</button>
      </div>`;
  } else {
    html += `<button class="btn btn-red btn-block btn-lg" style="margin-bottom:12px" onclick="window._openDtStart()">⏱ Log Downtime Event</button>`;
  }

  if (eos) {
    html += `<div class="card"><div class="card-header"><div class="card-title">✅ Shift Submitted</div><button class="btn btn-ghost btn-sm" onclick="window._openEOS()">Edit</button></div>
      <div class="card-body">
        <div style="font-family:var(--font-head);font-size:22px;font-weight:800;color:var(--navy)">${Number(eos.output).toLocaleString()} ${dept?.unit}</div>
        <div style="font-size:12px;color:var(--gray-400);margin-top:4px">${eos.fte} FTE · ${eos.hrs} hrs${eos.notes?' · "'+eos.notes+'"':''}</div>
      </div></div>`;
  } else {
    html += `<button class="btn btn-green btn-block btn-lg" style="margin-bottom:12px" onclick="window._openEOS()">📋 End of Shift — Enter Output</button>`;
  }

  html += `<div class="card"><div class="card-header"><div class="card-title">⏱ Today's Downtime Log</div></div><div class="card-body">`;
  if (!dtLog.length) {
    html += `<div style="text-align:center;color:var(--gray-400);padding:20px 0;font-size:13px">No downtime events logged today</div>`;
  } else {
    dtLog.slice().reverse().forEach(e => {
      const dur = e.endTs ? fmtDur(e.endTs-e.startTs) : 'Active...';
      const dot = DOWNTIME_TYPES.find(t=>t.label===e.type||t.key===e.type)?.dot||'other';
      html += `<div class="dt-log-item">
        <div class="dt-log-dot ${dot}"></div>
        <div class="dt-log-info">
          <div class="dt-log-type">${e.type||'In progress'}${e.isChangeover?' 🔄':''}</div>
          <div class="dt-log-notes">${e.notes||'No notes'}</div>
          <div class="dt-log-time">${fmtTime(e.startTs)}${e.endTs?' → '+fmtTime(e.endTs):' → running'}</div>
        </div>
        <div class="dt-log-dur ${!e.endTs?'active':''}">${dur}</div>
      </div>`;
    });
  }
  html += `</div></div>`;
  html += `<div style="text-align:center;padding:8px 0 4px"><button class="btn btn-ghost btn-sm" onclick="window._showScreen('dashboard')">📊 View Plant Dashboard</button></div>`;

  document.getElementById('machine-page').innerHTML = html;
  updateLiveTimer();
}

// FIRESTORE DATA HELPERS

function machineKey(machine) { return machine.replace(/[^a-zA-Z0-9]/g,'_'); }

async function loadDtLog(date, machine) {
  try {
    const snap = await db.collection('downtime').doc(`${date}_${machineKey(machine)}`).get();
    return snap.exists ? (snap.data().events || []) : [];
  } catch(e) { return LS.get(`idi_dt_${date}_${machineKey(machine)}`) || []; }
}

async function saveDtLog(date, machine, events) {
  const key = `${date}_${machineKey(machine)}`;
  try {
    await db.collection('downtime').doc(key).set({ date, machine, events, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
  } catch(e) {
    LS.set(`idi_dt_${date}_${machineKey(machine)}`, events);
  }
}

async function loadEOS(date, machine) {
  try {
    const snap = await db.collection('eos').doc(`${date}_${machineKey(machine)}`).get();
    return snap.exists ? snap.data() : null;
  } catch(e) { return LS.get(`idi_eos_${date}_${machineKey(machine)}`); }
}

async function saveEOSToFirestore(date, machine, deptId, data) {
  const key = `${date}_${machineKey(machine)}`;
  const record = { ...data, date, machine, deptId, deptName: DEPT_CONFIG[deptId]?.name,
    submittedBy: _profile?.name || _user?.email, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
  try {
    await db.collection('eos').doc(key).set(record);
    // Also write to unified records collection for history/dashboard
    await db.collection('records').doc(key).set(record);
  } catch(e) {
    LS.set(`idi_eos_${date}_${machineKey(machine)}`, data);
    showToast('Saved locally — sync when online');
  }
}


async function loadRecordsForRange(from, to) {
  try {
    let q = db.collection('records').where('date','>=',from).where('date','<=',to);
    const snap = await q.get();
    return snap.docs.map(d => d.data()).sort((a,b) => b.date.localeCompare(a.date));
  } catch(e) { console.log('Range load error:', e); return []; }
}

async function loadRecordsForDate(date) {
  try {
    const q = db.collection('records').where('date','==',date);
    const snap = await q.get();
    return snap.docs.map(d => d.data());
  } catch(e) { return []; }
}

async function loadAllDtForDate(date) {
  try {
    const q = db.collection('downtime').where('date','==',date);
    const snap = await q.get();
    const all = [];
    snap.docs.forEach(d => { const data=d.data(); (data.events||[]).forEach(e=>all.push({...e,machine:data.machine})); });
    return all.sort((a,b)=>b.startTs-a.startTs);
  } catch(e) { return []; }
}

// Force sync profile from Firebase — operator can use if machine name seems wrong
async function forceSyncProfile() {

  await loadUserProfile(_user.uid);

function stopDowntime() {
  if (!_activeDt) return;
  _pendingDtEndTs = Date.now();
  _selectedDtType = null;
  const dur = fmtDur(_pendingDtEndTs - _activeDt.startTs);
  document.getElementById('dt-stop-duration').textContent = `Duration: ${dur}`;
  const grid = document.getElementById('dt-type-grid');
  grid.innerHTML = DOWNTIME_TYPES.map(t=>`
    <div class="dt-type-btn" id="dttype-${t.key}" onclick="window._selectDtType('${t.key}','${t.label}')">
      <span class="dt-type-icon">${t.icon}</span>
      <span class="dt-type-label">${t.label}</span>
    </div>`).join('');
  document.getElementById('dt-notes-input').value = '';
  document.getElementById('dt-is-changeover').value = 'no';
  clearInterval(_timerInterval);
  document.getElementById('dt-stop-screen').classList.add('open');
}
window._stopDowntime = stopDowntime;

function undoDowntime() {
  // Cancel the active timer without logging anything
  _activeDt = null;
  _pendingDtEndTs = null;
  LS.del('idi_active_dt');
  clearInterval(_timerInterval);
  // Close stop screen if open
  const stopScreen = document.getElementById('dt-stop-screen');
  if (stopScreen) stopScreen.classList.remove('open');
  renderMachineScreen();
  showToast('⟵ Downtime cancelled');
}
window._undoDowntime = undoDowntime;


function cancelDtStop() {
  _pendingDtEndTs = null;
  document.getElementById('dt-stop-screen').classList.remove('open');
  startLiveTimer();
  showToast('Timer still running');
}
window._cancelDtStop = cancelDtStop;

async function saveDtStop() {
  if (!_selectedDtType) { showToast('Pick a downtime type'); return; }
  const notes = document.getElementById('dt-notes-input').value.trim();
  const isChangeover = document.getElementById('dt-is-changeover').value === 'yes';
  const today = TODAY();
  const machine = _profile?.machine;
  const log = await loadDtLog(today, machine);
  const event = { ..._activeDt, type:_selectedDtType, notes, isChangeover, endTs:_pendingDtEndTs };
  log.push(event);
  await saveDtLog(today, machine, log);
  const dur = fmtDur(_pendingDtEndTs - _activeDt.startTs);
  _activeDt = null; _pendingDtEndTs = null;
  LS.del('idi_active_dt');
  document.getElementById('dt-stop-screen').classList.remove('open');
  renderMachineScreen();
  showToast(`✓ ${_selectedDtType} — ${dur} logged`);
}
window._saveDtStop = saveDtStop;

function selectDtType(key, label) {
  _selectedDtType = label;
  document.querySelectorAll('.dt-type-btn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('dttype-'+key)?.classList.add('sel');
  if (key==='changeover') document.getElementById('dt-is-changeover').value='yes';
}
window._selectDtType = selectDtType;

function startLiveTimer() {
  clearInterval(_timerInterval);
  if (!_activeDt) return;
  _timerInterval = setInterval(updateLiveTimer, 1000);
}
function updateLiveTimer() {
  const el = document.getElementById('live-timer');
  if (!el || !_activeDt) return;
  el.textContent = fmtDur(Date.now() - _activeDt.startTs);
}

// END OF SHIFT
// ═══════════════════════════════════════════════════
async function openEOS() {
  const deptId  = _profile?.deptId;
  const machine = _profile?.machine;
  const dept    = DEPT_CONFIG[deptId];
  const std     = getMachineStd(deptId, machine);
  const p       = (await loadEOS(TODAY(), machine)) || {};

  let html = `<div class="sec-label">Production — ${machine}</div>`;

  if (dept?.autoCalcSqft) {
    html += `<div class="dark-grid-3">
      <div class="dark-field"><label>Width (in)</label><input type="number" id="eos-width" value="${p.width||''}" placeholder="24" oninput="window._eosCalcGlue()"></div>
      <div class="dark-field"><label>Length (in)</label><input type="number" id="eos-length" value="${p.length||''}" placeholder="84" oninput="window._eosCalcGlue()"></div>
      <div class="dark-field"><label>Qty Panels</label><input type="number" id="eos-qty" value="${p.qty||''}" placeholder="0" oninput="window._eosCalcGlue()"></div>
    </div>
    <div class="dark-field"><label>SQFT (auto-calculated)</label>
      <input type="number" id="eos-output" value="${p.output||''}" placeholder="Auto" readonly style="opacity:0.7">
      <div class="hint neutral" id="eos-hint">Enter dimensions above</div>
    </div>`;
  } else if (dept?.multiProduct) {

function eosCalcGlue() {
  const w=parseFloat(document.getElementById('eos-width')?.value)||0;
  const l=parseFloat(document.getElementById('eos-length')?.value)||0;
  const q=parseFloat(document.getElementById('eos-qty')?.value)||0;
  const sqft=w&&l&&q?Math.round((w/12)*(l/12)*q):0;
  const el=document.getElementById('eos-output'); if(el) el.value=sqft||'';
  const h=document.getElementById('eos-hint'); if(h&&w&&l&&q) h.textContent=`${w}"×${l}"×${q} = ${sqft.toLocaleString()} SQFT`;
}
window._eosCalcGlue = eosCalcGlue;

function eosCalcTen() {
  const d=parseFloat(document.getElementById('eos-doors')?.value)||0;
  const dr=parseFloat(document.getElementById('eos-drawers')?.value)||0;
  const p=parseFloat(document.getElementById('eos-panels')?.value)||0;
  const el=document.getElementById('eos-output'); if(el) el.value=d+dr+p||'';
  const h=document.getElementById('eos-hint'); if(h) h.textContent=`${d}+${dr}+${p} = ${(d+dr+p).toLocaleString()} pcs`;
}
window._eosCalcTen = eosCalcTen;

function eosUpdateHint() {
  const std=getMachineStd(_profile?.deptId, _profile?.machine);
  const dept=DEPT_CONFIG[_profile?.deptId];
  const val=parseFloat(document.getElementById('eos-output')?.value)||0;
  const h=document.getElementById('eos-hint'); if(!h||!std) return;
  const pct=Math.round((val/std)*100);
  h.className='hint '+(pct>=90?'good':pct>=75?'warn':'bad');
  h.textContent=`${val.toLocaleString()} / ${std.toLocaleString()} = ${pct}% of standard`;
}
window._eosUpdateHint = eosUpdateHint;

function eosUpdateYield() {
  const dept=DEPT_CONFIG[_profile?.deptId]; if(!dept?.yieldable) return;
  const val=parseFloat(document.getElementById('eos-yield')?.value)||0;
  const h=document.getElementById('eos-yield-hint'); if(!h) return;
  let stdY=dept.materialTypes
    ?(document.getElementById('eos-material')?.value?.toLowerCase().includes('mdf')?getStd(_profile.deptId).yieldMDF:getStd(_profile.deptId).yieldHdwd)
    :getStd(_profile?.deptId)?.yield;
  if(!val||!stdY){return;}
  const diff=val-Math.round(stdY*100);
  h.className='hint '+(val/100>=stdY*0.95?'good':val/100>=stdY*0.85?'warn':'bad');
  h.textContent=`${val}% vs std ${Math.round(stdY*100)}% (${diff>=0?'+':''}${diff}pp)`;
}
window._eosUpdateYield = eosUpdateYield;

async function saveEOS() {
  const deptId  = _profile?.deptId;
  const machine = _profile?.machine;
  const dept    = DEPT_CONFIG[deptId];
  const output  = parseFloat(document.getElementById('eos-output')?.value)||0;
  if (!output) { showToast('Enter your output first'); return; }

  const machObjEOS = getDeptMachines(deptId).find(m=>(m.name||m)===machine);
  const stdFte  = machObjEOS?.fte || getStd(deptId)?.fte || 2;
  const fte     = parseFloat(document.getElementById('eos-fte')?.value)||stdFte;
  const hrs     = parseFloat(document.getElementById('eos-hrs')?.value)||8;
  const scrap   = parseFloat(document.getElementById('eos-scrap')?.value)||0;
  const scrapReason = document.getElementById('eos-scrap-reason')?.value||'';
  const notes   = document.getElementById('eos-notes')?.value||'';
  const yieldVal= document.getElementById('eos-yield') ? parseFloat(document.getElementById('eos-yield').value)/100||null : null;
  const material= document.getElementById('eos-material')?.value||null;
  const width   = parseFloat(document.getElementById('eos-width')?.value)||null;
  const length  = parseFloat(document.getElementById('eos-length')?.value)||null;
  const qty     = parseFloat(document.getElementById('eos-qty')?.value)||null;
  const doors   = parseFloat(document.getElementById('eos-doors')?.value)||null;
  const drawers = parseFloat(document.getElementById('eos-drawers')?.value)||null;
  const panels  = parseFloat(document.getElementById('eos-panels')?.value)||null;

  const std = getMachineStd(deptId, machine);
  // OE = output / (std_per_min × actual_mins × fte_ratio)
  // Accounts for both hours worked AND headcount vs standard
  const machObjForFte = getDeptMachines(deptId).find(m=>(m.name||m)===machine);
  const stdFteForOE = machObjForFte?.fte || getStd(deptId)?.fte || 1;
  const stdPerMin = std ? std / 480 : null;  // 480 = 8 clock hours
  const actualMins = hrs * 60;
  const fteRatio = stdFteForOE > 0 ? fte / stdFteForOE : 1;
  const adjustedStd = stdPerMin ? stdPerMin * actualMins * fteRatio : null;
  const oe  = adjustedStd&&output ? output/adjustedStd : null;
  const today = TODAY();
  const dtLog = await loadDtLog(today, machine);
  const totalDowntime = Math.round(dtLog.reduce((a,e)=>a+(e.endTs?e.endTs-e.startTs:0),0)/60000);
  const changeovers   = dtLog.filter(e=>e.isChangeover).length;

  const data = { output, fte, hrs, scrap, scrapReason, notes, yield:yieldVal, material,
    width, length, qty, doors, drawers, panels, oe, totalDowntime, changeovers };

  showToast('Saving...');
  await saveEOSToFirestore(today, machine, deptId, data);
  closeEOS();
  renderMachineScreen();
  showBigToast(oe, output, dept?.unit);
}
window._saveEOS = saveEOS;

    const avgOE=oeVals.length?oeVals.reduce((a,b)=>a+b,0)/oeVals.length:null;
    const oeC=avgOE===null?'none':avgOE>=0.85?'good':avgOE>=0.70?'warn':'bad';
    const totalOut=dRecs.reduce((a,r)=>a+(parseFloat(r.output)||0),0);

}

      const mOE = rec.oe !== null && rec.oe !== undefined ? rec.oe : null;

      const dtBadge = rec.totalDowntime ? `<span class="tile-mach-dt">${rec.totalDowntime}m</span>` : '';
      // Yield badge — most important metric
      const yieldBadge = rec.yield != null ? (() => {
        const dept2 = DEPT_CONFIG[deptId];

        if (dept2?.materialTypes) {
          stdY = rec.material?.toLowerCase().includes('mdf') 
            ? getStd(deptId).yieldMDF 
            : getStd(deptId).yieldHdwd;
        } else {
          stdY = getStd(deptId).yield;
        }
        const yPct = Math.round(rec.yield * 100);
        const yC = stdY ? (rec.yield >= stdY * 0.97 ? '#4dcc80' : rec.yield >= stdY * 0.88 ? '#f0c040' : '#ff8080') : '#5a8fb5';
        const matLabel = rec.material ? ` <span style="font-size:9px;opacity:0.6">${rec.material.split(' ')[0]}</span>` : '';
        return `<span style="font-family:var(--font-head);font-size:11px;font-weight:800;color:${yC};background:rgba(255,255,255,0.06);padding:1px 5px;border-radius:3px">${yPct}%${matLabel}</span>`;
      })() : '';
      return `
        <div class="tile-mach-row">
          <span class="tile-mach-dot ${mOEC}"></span>
          <span class="tile-mach-name">${mname}</span>
          <span class="tile-mach-val ${mOEC}">${mVal}</span>
          ${yieldBadge}
          ${dtBadge}
        </div>`;
    }).join('');

    return `<div class="dept-tile">
      <div class="dept-tile-head">
        <span class="dept-tile-icon">${dept.icon}</span>
        <div class="dept-tile-name">${dept.name}</div>
        <div class="dept-tile-oe-sm ${oeC}">${oeDisplay}</div>
      </div>
      <div class="tile-mach-list">${machRows}</div>
      <div class="dept-tile-footer">
        <span>${totalOut>0?totalOut.toLocaleString()+' '+dept.unit:'0 '+dept.unit} total</span>
        <span style="color:${totalDt>60?'#ff8080':totalDt>0?'#f0c040':'rgba(255,255,255,0.2)'}">${totalDt>0?totalDt+'m DT':''}</span>
      </div>
      <div class="dept-tile-bar"><div class="dept-tile-bar-fill" style="width:${pct}%;background:${barC}"></div></div>
    </div>`;
  }).join('');
}

async function loadHistory() {
  const from = document.getElementById('hist-from')?.value;
  const to   = document.getElementById('hist-to')?.value || TODAY();
  const el   = document.getElementById('hist-body');
  if (!el) return;
  el.innerHTML = '<div style="text-align:center;color:var(--gray-400);padding:20px 0">Loading...</div>';
  const recs = await loadRecordsForRange(from, to);
  if (!recs.length) { el.innerHTML='<div style="text-align:center;color:var(--gray-400);padding:30px 0;font-size:13px">No records for this date</div>'; return; }
  // Group by date first, then dept
  const byDate={};
  recs.forEach(r=>{if(!byDate[r.date])byDate[r.date]={};if(!byDate[r.date][r.deptId])byDate[r.date][r.deptId]=[];byDate[r.date][r.deptId].push(r);});
  let html='';
  for(const [date,depts] of Object.entries(byDate)){
    html+=`<div style="font-family:var(--font-head);font-size:16px;font-weight:800;color:var(--navy);letter-spacing:1px;margin:16px 0 8px;padding-bottom:6px;border-bottom:2px solid var(--accent)">${date}</div>`;
    for(const [deptId,drecs] of Object.entries(depts)){
    const dept=DEPT_CONFIG[deptId];
    html+=`<div class="section-title">${dept?.icon} ${dept?.name||deptId}</div>`;
    drecs.forEach(r=>{
      const oeStr=r.oe!=null?Math.round(r.oe*100)+'%':'—';
      const oeC=r.oe!=null?(r.oe>=0.85?'good':r.oe>=0.70?'warn':'bad'):'none';
      html+=`<div class="entry-item">
        <div class="entry-badge">${r.machine}<br><span style="font-size:13px;font-weight:800">${oeStr}</span></div>
        <div class="entry-info">
          <div class="entry-main">${Number(r.output||0).toLocaleString()} ${dept?.unit||''}</div>
          <div class="entry-sub">${r.fte||'?'} FTE · ${r.hrs||'?'} hrs${r.yield?' · Yield: '+Math.round(r.yield*100)+'%':''}${r.material?' · '+r.material:''}</div>
          <div class="entry-pills">
            <span class="pill pill-${oeC}">OE ${oeStr}</span>
            ${r.totalDowntime?`<span class="pill pill-${r.totalDowntime>60?'bad':'warn'}">⏱ ${r.totalDowntime}m</span>`:''}
            ${r.changeovers?`<span class="pill pill-blue">${r.changeovers} CO</span>`:''}
            ${r.scrap?`<span class="pill pill-bad">Scrap: ${r.scrap}</span>`:''}
          </div>
          ${r.notes?`<div class="entry-sub" style="margin-top:4px;font-style:italic">"${r.notes}"</div>`:''}
          ${r.submittedBy?`<div style="font-size:9px;color:var(--gray-400);margin-top:3px">By ${r.submittedBy}</div>`:''}
        </div>
        <button class="btn btn-ghost btn-sm" onclick="window._deleteRec('${r.date}_${machineKey(r.machine)}')">🗑</button>
      </div>`;
    });
    } // end dept loop
  } // end date loop
  el.innerHTML = html;
}
window._loadHistory = loadHistory;

async function exportCSV() {
  const date = document.getElementById('hist-date')?.value || TODAY();
  const recs = await loadRecordsForDate(date);
  if (!recs.length) { showToast('No data'); return; }
  const headers=['Date','Department','Machine','Output','Unit','FTE','Hours','Yield%','Material','OE%','DT_Min','Changeovers','Scrap','ScrapReason','Notes','SubmittedBy'];
  const rows=recs.map(r=>{const dept=DEPT_CONFIG[r.deptId];return[r.date,r.deptName,r.machine,r.output||0,dept?.unit||'',r.fte||'',r.hrs||'',r.yield?Math.round(r.yield*100):'',r.material||'',r.oe?Math.round(r.oe*100):'',r.totalDowntime||0,r.changeovers||0,r.scrap||0,r.scrapReason||'',(r.notes||'').replace(/,/g,';'),r.submittedBy||''].join(',');});
  const csv=[headers.join(','),...rows].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`IDI_Production_${date}.csv`;a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Exported');
}

async function addMachine(deptId) {
  const name = prompt(`New machine name for ${DEPT_CONFIG[deptId]?.name}:`);

  const machines = getDeptMachines(deptId).map(m => typeof m === 'string' ? {name:m, type:null} : m);

  showToast(`✓ ${name.trim()} added to ${DEPT_CONFIG[deptId]?.name}`);

async function renameMachine(deptId, idx, newName) {
  if (!newName.trim()) return;
  const machines = getDeptMachines(deptId).map(m => typeof m === 'string' ? {name:m, type:null} : {...m});
  if (!machines[idx]) return;
  const oldName = machines[idx].name;
  if (oldName === newName.trim()) return;
  machines[idx].name = newName.trim();
  _machineConfig[deptId] = machines;
  await saveMachineConfig();
  try {
    // Load ALL users and filter in JS — avoids needing a Firestore index
    const allUsers = await db.collection('users').get();
    const toUpdate = allUsers.docs.filter(d => d.data().machine === oldName);
    await Promise.all(toUpdate.map(d => d.ref.update({machine: newName.trim()})));
    // Update current logged-in user session if they were on this machine
    if (_profile && _profile.machine === oldName) {
      _profile.machine = newName.trim();
      const headerEl = document.getElementById('header-user-info');
      if (headerEl) headerEl.textContent = _profile.name + ' · ' + _profile.machine;
    }
    // Refresh current user profile in case they are on this machine
    await refreshProfile();
    showToast('✓ ' + oldName + ' renamed to ' + newName.trim() + (toUpdate.length ? ' · ' + toUpdate.length + ' user(s) updated' : ''));
  } catch(e) {
    console.log('Rename error:', e);
    showToast('✓ Machine renamed');
  }
  renderMachineMgmt();
}
window._renameMachine = renameMachine;

async function removeMachine(deptId, idx) {

async function openDtChart() {
  document.getElementById('dt-chart-screen').classList.add('open');
  document.getElementById('dt-chart-date').textContent = TODAY();
  document.getElementById('dt-chart-body').innerHTML = '<div style="text-align:center;padding:40px;color:var(--gray-400);font-family:var(--font-head);letter-spacing:1px">Loading...</div>';

  const today = TODAY();
  const allDtSnap = await db.collection('downtime').where('date','==',today).get();
  const allEvents = [];
  allDtSnap.docs.forEach(d => {
    const data = d.data();
    (data.events||[]).forEach(e => {
      if (e.endTs) allEvents.push({...e, machine: data.machine});
    });
  });

  if (!allEvents.length) {
    document.getElementById('dt-chart-body').innerHTML = '<div style="text-align:center;padding:60px;color:rgba(255,255,255,0.3);font-family:var(--font-head);letter-spacing:2px;text-transform:uppercase">No downtime events today</div>';
    return;
  }

  // Aggregate by type
  const byType = {};
  const byMachine = {};
  let totalMs = 0;

  allEvents.forEach(e => {
    const dur = e.endTs - e.startTs;
    const mins = Math.round(dur / 60000);
    totalMs += dur;
    byType[e.type] = (byType[e.type] || 0) + mins;
    if (!byMachine[e.machine]) byMachine[e.machine] = { total:0, events:[] };
    byMachine[e.machine].total += mins;
    byMachine[e.machine].events.push(e);
  });

  const totalMins = Math.round(totalMs / 60000);
  const typeColors = {
    'Changeover':      '#5a8fb5',
    'Waiting Material':'#f0c040',
    'Forklift Delay':  '#e07820',
    'Mechanical':      '#c8281e',
    'Bathroom Break':  '#9b59b6',
    'Other':           '#9aa5b4',
  };

  // Build donut SVG
  const types = Object.entries(byType).sort((a,b)=>b[1]-a[1]);
  const cx=120, cy=120, r=85, ri=50;
  let startAngle = -Math.PI/2;
  let slices = '';
  let legend = '';

  types.forEach(([type, mins]) => {
    const pct = mins / totalMins;
    const angle = pct * 2 * Math.PI;
    const x1 = cx + r * Math.cos(startAngle);
    const y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(startAngle + angle);
    const y2 = cy + r * Math.sin(startAngle + angle);
    const xi1 = cx + ri * Math.cos(startAngle);
    const yi1 = cy + ri * Math.sin(startAngle);
    const xi2 = cx + ri * Math.cos(startAngle + angle);
    const yi2 = cy + ri * Math.sin(startAngle + angle);
    const large = angle > Math.PI ? 1 : 0;
    const color = typeColors[type] || '#9aa5b4';

    slices += `<path d="M${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${xi2},${yi2} A${ri},${ri} 0 ${large},0 ${xi1},${yi1} Z" fill="${color}" opacity="0.9"/>`;
    legend += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div style="width:12px;height:12px;border-radius:3px;background:${color};flex-shrink:0"></div>
      <div style="flex:1;font-family:var(--font-head);font-size:13px;font-weight:700;color:rgba(255,255,255,0.8)">${type}</div>
      <div style="font-family:var(--font-head);font-size:13px;font-weight:800;color:#fff">${mins}m</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.4);min-width:36px;text-align:right">${Math.round(pct*100)}%</div>
    </div>`;
    startAngle += angle;
  });

  // Center text
  const centerText = `<text x="${cx}" y="${cy-8}" text-anchor="middle" font-family="Barlow Condensed" font-size="28" font-weight="800" fill="#fff">${totalMins}m</text>
    <text x="${cx}" y="${cy+14}" text-anchor="middle" font-family="Barlow Condensed" font-size="11" fill="rgba(90,143,181,0.7)" letter-spacing="2">TOTAL DT</text>`;

  // By machine table
  const machineRows = Object.entries(byMachine)
    .sort((a,b)=>b[1].total-a[1].total)
    .map(([machine, data]) => {
      const pct = Math.round((data.total/totalMins)*100);
      const barW = pct;
      return `<div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <div style="font-family:var(--font-head);font-size:13px;font-weight:700;color:#fff">${machine}</div>
          <div style="font-family:var(--font-head);font-size:13px;font-weight:800;color:${data.total>30?'#ff8080':data.total>15?'#f0c040':'#4dcc80'}">${data.total}m</div>
        </div>
        <div style="height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${barW}%;background:${data.total>30?'#c8281e':data.total>15?'#d4a017':'#1a7a40'};border-radius:3px;transition:width 0.5s"></div>
        </div>
        <div style="font-size:10px;color:rgba(255,255,255,0.3);margin-top:3px">${data.events.map(e=>e.type).join(' · ')}</div>
      </div>`;
    }).join('');

  document.getElementById('dt-chart-body').innerHTML = `
    <div style="display:grid;grid-template-columns:240px 1fr;gap:20px;align-items:start;margin-bottom:24px">
      <div>
        <svg viewBox="0 0 240 240" style="width:100%">
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="rgba(255,255,255,0.04)"/>
          ${slices}
          ${centerText}
        </svg>
      </div>
      <div style="padding-top:16px">${legend}</div>
    </div>
    <div class="sec-label">By Machine</div>
    <div style="margin-top:12px">${machineRows}</div>
    <div style="height:20px"></div>`;
}
window._openDtChart = openDtChart;

async function buildTrendChart() {
  const deptId  = document.getElementById('trend-dept')?.value;
  const machine = document.getElementById('trend-machine')?.value;
  const metric  = document.getElementById('trend-metric')?.value;
  const from    = document.getElementById('hist-from')?.value;
  const to      = document.getElementById('hist-to')?.value || TODAY();
  const dept    = DEPT_CONFIG[deptId];
  const el      = document.getElementById('trend-chart-area');
  if (!el) return;

  el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray-400)">Loading chart...</div>';

  const recs = await loadRecordsForRange(from, to);
  const filtered = recs.filter(r => r.deptId === deptId && (machine==='ALL' || r.machine===machine));

  if (!filtered.length) { el.innerHTML='<div style="text-align:center;padding:20px;color:var(--gray-400)">No data in range</div>'; return; }

  // Group by date, average metric
  const byDate = {};
  filtered.forEach(r => {
    if (!byDate[r.date]) byDate[r.date] = [];
    let val = null;
    if (metric==='oe')       val = r.oe != null ? Math.round(r.oe*100) : null;
    if (metric==='output')   val = parseFloat(r.output) || null;
    if (metric==='yield')    val = r.yield != null ? Math.round(r.yield*100) : null;
    if (metric==='downtime') val = r.totalDowntime || 0;
    if (metric==='scrap')    val = parseFloat(r.scrap) || 0;
    if (val !== null) byDate[r.date].push(val);
  });

  const dates = Object.keys(byDate).sort();
  const values = dates.map(d => {
    const vals = byDate[d].filter(v=>v!==null);
    return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : null;
  });

  // Build SVG line chart
  const W=800, H=220, PAD={top:20,right:20,bottom:40,left:60};
  const chartW = W-PAD.left-PAD.right;
  const chartH = H-PAD.top-PAD.bottom;

  const validVals = values.filter(v=>v!==null);
  const minV = Math.min(...validVals);
  const maxV = Math.max(...validVals);
  const range = maxV - minV || 1;

  const metricLabels = {oe:'OE %', output:'Output ('+dept?.unit+')', yield:'Yield %', downtime:'Downtime (min)', scrap:'Scrap'};
  const metricColors = {oe:'#4dcc80', output:'#5a8fb5', yield:'#f0c040', downtime:'#ff8080', scrap:'#c8281e'};
  const color = metricColors[metric] || '#5a8fb5';

  // Build points
  const pts = dates.map((d,i) => {
    if (values[i]===null) return null;
    const x = PAD.left + (i/(dates.length-1||1))*chartW;
    const y = PAD.top + chartH - ((values[i]-minV)/range)*chartH;
    return {x, y, val:values[i], date:d};
  }).filter(Boolean);

  const polyline = pts.map(p=>`${p.x},${p.y}`).join(' ');
  const area = pts.length>1 ? `M${pts[0].x},${PAD.top+chartH} L${pts.map(p=>`${p.x},${p.y}`).join(' L')} L${pts[pts.length-1].x},${PAD.top+chartH} Z` : '';

  // Y axis labels
  const yLabels = [0,0.25,0.5,0.75,1].map(t => {
    const val = Math.round(minV + t*range);
    const y = PAD.top + chartH - t*chartH;
    return `<text x="${PAD.left-8}" y="${y+4}" text-anchor="end" font-size="11" fill="rgba(255,255,255,0.4)" font-family="Barlow Condensed">${val}${metric==='oe'||metric==='yield'?'%':''}</text>
    <line x1="${PAD.left}" y1="${y}" x2="${PAD.left+chartW}" y2="${y}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`;
  }).join('');

  // X axis labels (show subset)
  const step = Math.ceil(dates.length/8);
  const xLabels = dates.filter((_,i)=>i%step===0||i===dates.length-1).map((d,_,arr) => {
    const i = dates.indexOf(d);
    const x = PAD.left + (i/(dates.length-1||1))*chartW;
    const label = d.slice(5); // MM-DD
    return `<text x="${x}" y="${H-8}" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.4)" font-family="Barlow Condensed">${label}</text>`;
  }).join('');

  // Dots
  const dots = pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="${color}" stroke="var(--navy-dark)" stroke-width="2">
    <title>${p.date}: ${p.val}${metric==='oe'||metric==='yield'?'%':''}</title>
  </circle>`).join('');

  // Stats
  const avg = Math.round(validVals.reduce((a,b)=>a+b,0)/validVals.length);
  const best = Math.max(...validVals);
  const worst = Math.min(...validVals);

  el.innerHTML = `
    <div style="font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:12px;text-transform:uppercase">
      ${dept?.icon} ${dept?.name} — ${machine==='ALL'?'All Machines':machine} — ${metricLabels[metric]} — ${from} to ${to}
    </div>
    <div style="display:flex;gap:16px;margin-bottom:14px">
      <div style="background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:8px;padding:10px 16px;text-align:center">
        <div style="font-family:var(--font-head);font-size:22px;font-weight:800;color:var(--navy)">${avg}${metric==='oe'||metric==='yield'?'%':''}</div>
        <div style="font-size:10px;color:var(--gray-400);letter-spacing:1px">AVG</div>
      </div>
      <div style="background:var(--green-pale);border:1.5px solid rgba(26,122,64,0.2);border-radius:8px;padding:10px 16px;text-align:center">
        <div style="font-family:var(--font-head);font-size:22px;font-weight:800;color:var(--green)">${best}${metric==='oe'||metric==='yield'?'%':''}</div>
        <div style="font-size:10px;color:var(--green);letter-spacing:1px">BEST</div>
      </div>
      <div style="background:var(--red-pale);border:1.5px solid rgba(200,40,30,0.2);border-radius:8px;padding:10px 16px;text-align:center">
        <div style="font-family:var(--font-head);font-size:22px;font-weight:800;color:var(--red)">${worst}${metric==='oe'||metric==='yield'?'%':''}</div>
        <div style="font-size:10px;color:var(--red);letter-spacing:1px">WORST</div>
      </div>
      <div style="background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:8px;padding:10px 16px;text-align:center">
        <div style="font-family:var(--font-head);font-size:22px;font-weight:800;color:var(--navy)">${dates.length}</div>
        <div style="font-size:10px;color:var(--gray-400);letter-spacing:1px">DAYS</div>
      </div>
    </div>
    <div style="background:var(--navy-dark);border-radius:var(--radius);padding:10px;overflow-x:auto">
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:400px">
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
          </linearGradient>
        </defs>
        ${yLabels}
        ${xLabels}
        ${area ? `<path d="${area}" fill="url(#areaGrad)"/>` : ''}
        ${pts.length>1 ? `<polyline points="${polyline}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round"/>` : ''}
        ${dots}
      </svg>
    </div>`;
}
window._buildTrendChart = buildTrendChart;
